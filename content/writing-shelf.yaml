# Curated writing shelf for ericcaskey.com/writing (EC-WRITING-1).
#
# MEMBERSHIP (which essays) and NOTE (the local editorial blurb) are curated
# HERE. The title, date, and url are NOT stored here: they are joined in from
# caskeycoding.com/blog-index.json at build time by
# scripts/fetch-writing-feed.mjs, keyed on `slug`, so the shelf never drifts
# stale against the canonical blog.
#
# Order below is the render order (newest-first today). `slug` must match the
# caskeycoding.com/blog post slug exactly. An unknown slug HARD-FAILS the
# build. Each `note` is a double-quoted string. Changing membership or a note
# is an editorial decision (owner territory).
essays:
  - slug: pricing-215-million-options-a-second
    note: "A clean C++ options pricer, tuned from 15 to 215 million prices a second. Most of my speedup assumptions died one measurement at a time."
  - slug: ballast-an-llm-that-says-i-dont-know
    note: "A RAG system whose most important feature is refusing to answer. How trust got built into the architecture instead of the prompt."
  - slug: building-an-ai-finance-app
    note: "An honest account of what worked, what did not, and why the hard part is rarely the AI."
  - slug: designing-safety-guardrails-for-distributed-workflow-orchestration
    note: "What I've learned building validation engines for infrastructure where an incorrect “yes” is a production incident."
  - slug: spec-driven-development-and-the-folder-architecture-that-makes-it-work
    note: "How I structure projects so AI agents and humans can both find their way around. This is the methodology behind everything else."
