name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write

env:
  S3_BUCKET: ericcaskey.com
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build (static export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v6
      - id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # The contact form is the site's only conversion path. A production
      # build without NEXT_PUBLIC_CONTACT_API_URL bakes in a relative
      # /contact POST against CloudFront, which fails every submission.
      # Fail the deploy loudly instead of shipping a broken form (B-070).
      - name: Assert contact API URL is configured
        env:
          NEXT_PUBLIC_CONTACT_API_URL: ${{ vars.NEXT_PUBLIC_CONTACT_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_CONTACT_API_URL" ]; then
            echo "::error::Repository variable NEXT_PUBLIC_CONTACT_API_URL is not set." \
                 "The contact form would POST to the static origin and fail every" \
                 "submission. Set it with:" \
                 "gh variable set NEXT_PUBLIC_CONTACT_API_URL --body \"<api-endpoint>\""
            exit 1
          fi
          echo "Contact API URL configured: $NEXT_PUBLIC_CONTACT_API_URL"
      - run: npm run build
        env:
          NEXT_PUBLIC_CONTACT_API_URL: ${{ vars.NEXT_PUBLIC_CONTACT_API_URL }}
      - name: Verify contact API URL baked into export
        env:
          NEXT_PUBLIC_CONTACT_API_URL: ${{ vars.NEXT_PUBLIC_CONTACT_API_URL }}
        run: |
          if ! grep -rqF "$NEXT_PUBLIC_CONTACT_API_URL" out/_next/static/; then
            echo "::error::Built static export does not contain NEXT_PUBLIC_CONTACT_API_URL —" \
                 "the contact form would still POST relative /contact. Refusing to deploy."
            exit 1
          fi
          echo "Static export contains the contact API URL."
      - uses: actions/upload-artifact@v7
        with:
          name: static-export-${{ github.sha }}
          path: out/
          retention-days: 7

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment: production
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: static-export-${{ github.sha }}
          path: out/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync out/ s3://${{ env.S3_BUCKET }} --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  healthcheck:
    name: Multi-route healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy
    steps:
      - uses: actions/checkout@v6
      - name: Run healthcheck
        run: bash .github/scripts/healthcheck.sh https://ericcaskey.com

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: healthcheck
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${context.runNumber}`,
              name: `Release ${context.runNumber} — ${context.sha.substring(0, 7)}`,
              generate_release_notes: true,
            });

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy, healthcheck, create-release]
    if: always()
    environment: production
    steps:
      - name: Send Discord notification
        run: |
          if [ "${{ needs.healthcheck.result }}" = "success" ]; then
            COLOR=3066993
            STATUS="Production deploy succeeded — ericcaskey.com"
          else
            COLOR=15158332
            STATUS="Production deploy failed — ericcaskey.com"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"$STATUS\",\"description\":\"Commit \`${{ github.sha }}\` · [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"color\":$COLOR}]}"
