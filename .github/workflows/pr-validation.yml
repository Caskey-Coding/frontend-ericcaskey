name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  nda-scan:
    name: NDA Content Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      # Shared voice/NDA scanner lives in the PRIVATE caskeycoding-specs repo
      # (_shared/tooling/voice_scan.py, FLEET-1). This repo is PUBLIC, so the
      # default GITHUB_TOKEN cannot read it: requires a fine-grained read-only
      # PAT for caskeycoding-specs stored as the GH_CROSS_REPO_TOKEN secret
      # (FLEET-1b). The frontend-nda profile carries this repo's NDA ruleset.
      - name: Check out shared scan tooling (caskeycoding-specs)
        uses: actions/checkout@v4
        with:
          repository: Caskey-Coding/caskeycoding-specs
          path: .specs-tooling
          token: ${{ secrets.GH_CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scan for disallowed content (shared voice_scan.py, frontend-nda)
        run: |
          python3 .specs-tooling/_shared/tooling/voice_scan.py \
            --profile frontend-nda --root . src public

  voice-scan:
    name: Voice Rule Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check out shared scan tooling (caskeycoding-specs)
        uses: actions/checkout@v4
        with:
          repository: Caskey-Coding/caskeycoding-specs
          path: .specs-tooling
          token: ${{ secrets.GH_CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # The voice profile carries the case-sensitive marketing/title rules and
      # excludes PersonJsonLd.tsx (structured schema, not rendered copy).
      - name: Enforce voice rules (shared voice_scan.py, voice profile)
        run: |
          python3 .specs-tooling/_shared/tooling/voice_scan.py \
            --profile voice --root . src

  lint:
    name: Lint
    # Kill switch: set org var CI_PAUSED=true to skip. See AGENTS.md.
    if: vars.CI_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Build (static export)
    if: vars.CI_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [nda-scan, voice-scan, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: static-export-pr-${{ github.event.pull_request.number }}
          path: out/
          retention-days: 3

  e2e:
    name: Playwright E2E
    if: vars.CI_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: static-export-pr-${{ github.event.pull_request.number }}
          path: out/
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 7

  npm-audit:
    name: npm audit (advisory)
    if: vars.CI_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [nda-scan, voice-scan, lint, build, e2e, npm-audit]
    if: always()
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const results = {
              nda:   '${{ needs.nda-scan.result }}',
              voice: '${{ needs.voice-scan.result }}',
              lint:  '${{ needs.lint.result }}',
              build: '${{ needs.build.result }}',
              e2e:   '${{ needs.e2e.result }}',
              audit: '${{ needs.npm-audit.result }}',
            };
            const icon = (r) => r === 'success' ? 'Pass' : r === 'skipped' ? 'Skipped' : 'Fail';
            const body = [
              `## CI — PR #${context.issue.number}`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| NDA Content Scan | ${icon(results.nda)} |`,
              `| Voice Rule Scan | ${icon(results.voice)} |`,
              `| Lint + Typecheck | ${icon(results.lint)} |`,
              `| Build (static export) | ${icon(results.build)} |`,
              `| Playwright E2E | ${icon(results.e2e)} |`,
              `| npm audit (advisory) | ${icon(results.audit)} |`,
              '',
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('CI — PR #')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
