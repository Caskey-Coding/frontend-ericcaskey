name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools Bash(git diff:*),Bash(git log:*),Bash(ls:*),Bash(grep:*),Bash(rg:*),Read,Glob
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are reviewing a PR in caskey-coding/frontend-ericcaskey —
            the ericcaskey.com personal-authority site. Next.js 15 static
            export to S3 + CloudFront.

            Repo conventions:
            - 5 pages: /, /about, /work, /writing, /contact. The compact
              "arrivals-board" register is intentional — no cards, no
              extra heading depth, no widened containers (per
              caskeycoding-specs/_shared/architecture/001).
            - Cross-domain design system: shared CSS tokens with
              caskeycoding.com (see
              caskeycoding-specs/_shared/architecture/002). The h1
              clamp, focus-ring two-layer shadow, button radii, color
              tokens are contractual. Changes here need a paired
              change on caskeycoding.com.
            - Voice rules: no "Senior Software Engineer" / "Principal
              Engineer" in rendered copy (allowed only in PersonJsonLd.tsx
              JSON-LD). No marketing adjectives (cutting-edge, world-
              class, passionate, thought leader).
            - NDA: no internal Amazon tool/org/system names.
            - Theme handoff: CrossSiteLink appends ?theme= to caskeycoding.com
              outbound links. Pre-hydration script in layout.tsx reads the
              param and writes localStorage before React mounts.

            What to flag (in priority order):
            1. Design-system contract drift with caskeycoding.com —
               any change to a shared token, button shape, or focus
               ring must have a matching PR on the other repo.
            2. Voice / NDA rule drift.
            3. New outbound links to caskeycoding.com that don't use
               CrossSiteLink (breaks the theme handoff).
            4. Accessibility regressions: focus rings, aria-label,
               prefers-reduced-motion guard, 44px tap targets.
            5. Static-export safety: no SSR-only APIs.
            6. New routes that aren't in the deploy healthcheck route
               list (deploy-production.yml).

            Skip: style / formatting (eslint), praise.

            Output: bulleted findings with file path + line number.
