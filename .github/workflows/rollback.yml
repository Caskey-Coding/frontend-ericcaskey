name: Rollback Production (ericcaskey.com)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to redeploy (tag, branch, or SHA)'
        required: true
        type: string
      reason:
        description: 'Rollback reason (logged to Discord)'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write

env:
  S3_BUCKET: ericcaskey.com
  AWS_REGION: us-east-1

jobs:
  build:
    name: Build @ ${{ inputs.ref }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: rollback-static-export-${{ github.run_id }}
          path: out/
          retention-days: 7

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rollback-static-export-${{ github.run_id }}
          path: out/
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync out/ s3://${{ env.S3_BUCKET }} --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  healthcheck:
    name: Multi-route healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Run healthcheck
        run: bash .github/scripts/healthcheck.sh https://ericcaskey.com

  notify:
    name: Notify Discord (ROLLBACK)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy, healthcheck]
    if: always()
    environment: production
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REF: ${{ inputs.ref }}
          REASON: ${{ inputs.reason }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          if [ "${{ needs.healthcheck.result }}" = "success" ]; then
            COLOR=15844367
            STATUS="↩️ ericcaskey.com ROLLBACK to ${REF} succeeded"
          else
            COLOR=15158332
            STATUS="❌ ericcaskey.com ROLLBACK to ${REF} FAILED"
          fi
          curl -s --max-time 15 -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"${STATUS}\",\"description\":\"Ref: \`${REF}\` · Reason: ${REASON} · [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",\"color\":${COLOR},\"footer\":{\"text\":\"caskeycoding.com CI/CD\"}}]}" || true
